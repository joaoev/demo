spring.application.name=demo

# Configuracao do H2 Database (banco em memoria)
spring.datasource.url=jdbc:h2:mem:estudo_npi
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilitar o console do H2 (opcional)
spring.h2.console.enabled=true

# Mostrar o SQL no console
spring.jpa.show-sql=true

# Hibernate valida o schema; Flyway faz a criacao/evolucao
spring.jpa.hibernate.ddl-auto=create-drop


# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true
